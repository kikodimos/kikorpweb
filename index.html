<script async src="https://www.tiktok.com/embed.js"></script>
<script>

// Smooth scroll
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
  });
});

// Scroll animacije
const sections = document.querySelectorAll("section");
sections.forEach(sec => {
  sec.style.opacity = 0;
  sec.style.transform = "translateY(50px)";
  sec.style.transition = "all 0.8s ease";
});

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    let pos = sec.getBoundingClientRect().top;
    if (pos < window.innerHeight - 100) {
      sec.style.opacity = 1;
      sec.style.transform = "translateY(0)";
    }
  });
});

// Discord member count (REAL)
async function fetchDiscordMembers() {
  try {
    const res = await fetch("https://discord.com/api/guilds/1413643467799793728/widget.json");
    const data = await res.json();

    document.getElementById("memberCount").innerText = `Online: ${data.presence_count}`;
  } catch {
    document.getElementById("memberCount").innerText = "Ne može učitati članove";
}
